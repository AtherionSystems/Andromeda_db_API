# =============================================
# OCI IAM — OAuth2 Resource Server
# =============================================
# Spring Security fetches the JWKS from this URI and validates every incoming
# Bearer token automatically.  No code change required; just set this property.
#
# Replace with your actual OCI IAM / IDCS issuer URI, e.g.:
#   https://<your-tenant>.identity.oraclecloud.com/
# Or if your teacher gave you a direct JWKS URI, use the second property instead:
#   spring.security.oauth2.resourceserver.jwt.jwk-set-uri=<jwks-uri>
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://idcs-9f32f2619f6e4cf29d2a63de9154f879.identity.oraclecloud.com:443/oauth2/v1/keys
spring.security.oauth2.resourceserver.jwt.issuer-uri=

@RestController
@Profile("prod")
public class JwksController {

@GetMapping("/.well-known/jwks.json")
public ResponseEntity<String> jwks() throws IOException {
InputStream is = getClass().getResourceAsStream("/jwks.json");
String json = new String(is.readAllBytes());
return ResponseEntity.ok()
.contentType(MediaType.APPLICATION_JSON)
.body(json);
}
}