# =============================================
# Oracle Database Configuration
# =============================================
spring.datasource.url=jdbc:oracle:thin:@(description=(retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.mx-queretaro-1.oraclecloud.com))(connect_data=(service_name=g58ddf25860f4af_andromedadb_tp.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.data-source-properties.javax.net.ssl.trustStore=${WALLET_PATH}/truststore.jks
spring.datasource.hikari.data-source-properties.javax.net.ssl.trustStorePassword=${WALLET_TRUSTSTORE_PASSWORD}
spring.datasource.hikari.data-source-properties.javax.net.ssl.keyStore=${WALLET_PATH}/keystore.jks
spring.datasource.hikari.data-source-properties.javax.net.ssl.keyStorePassword=${WALLET_KEYSTORE_PASSWORD}

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# Flyway Migration Configuration
# =============================================
spring.flyway.enabled=false

# =============================================
# Telegram Bot Configuration
# =============================================
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# =============================================
# Bot AI Configuration
# =============================================
agent.ai.enabled=false
agent.ai.base-url=${AGENT_AI_BASE_URL}
agent.ai.api-key=${AGENT_AI_API_KEY}
agent.ai.model=${AGENT_AI_MODEL}